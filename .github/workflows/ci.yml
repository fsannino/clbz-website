name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Type-check
        run: pnpm run check

      - name: Unit tests
        run: pnpm run test

      - name: Production build
        run: pnpm run build

      - name: Verify SEO artifacts
        run: |
          test -f dist/public/sitemap.xml
          test -f dist/public/robots.txt
          test -f dist/public/insights/rss.xml
          echo "SEO artifacts present ✓"
